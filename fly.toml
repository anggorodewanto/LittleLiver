app = "littleliver"
primary_region = "iad"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "littleliver_data"
  destination = "/data"

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[env]
  DATABASE_PATH = "/data/littleliver.db"
  MIGRATIONS_DIR = "/migrations"
  STATIC_DIR = "/static"
