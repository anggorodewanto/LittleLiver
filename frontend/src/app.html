<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<style>
			#app-splash {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 16px;
				background: #fafaf8;
				color: #6b6560;
				font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
				font-size: 14px;
				z-index: 9999;
			}
			#app-splash .dot {
				width: 40px;
				height: 40px;
				border: 3px solid #e8f5ec;
				border-top-color: #4a9c5e;
				border-radius: 50%;
				animation: app-splash-spin 0.9s linear infinite;
			}
			@keyframes app-splash-spin {
				to { transform: rotate(360deg); }
			}
			@media (prefers-reduced-motion: reduce) {
				#app-splash .dot { animation-duration: 2s; }
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-splash" role="status" aria-live="polite">
			<div class="dot" aria-hidden="true"></div>
			<p style="margin:0;">Loading LittleLiver…</p>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
